<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script>
        function cal(value) {
            const display = document.getElementById("display");
            if (value === "AC") {
                display.value = "";
            } else if (value === "X") {
                display.value = display.value.slice(0, -1);
            } else if (value === "=") {
                try {
                    display.value = display.value + "=" + eval(display.value);
                } catch {
                    display.value = "Error";
                }
            } else {
                display.value += value;
            }
        }
    </script>
</head>
<body>
    <h1>Calculator</h1>
    <input type="text" id="display" readonly><br>

    <button onclick="cal('AC')">AC</button>
    <button onclick="cal('X')">X</button>
    <button onclick="cal('.')">.</button>
    <button onclick="cal('/')">/</button><br>

    <button onclick="cal('7')">7</button>
    <button onclick="cal('8')">8</button>
    <button onclick="cal('9')">9</button>
    <button onclick="cal('*')">*</button><br>

    <button onclick="cal('4')">4</button>
    <button onclick="cal('5')">5</button>
    <button onclick="cal('6')">6</button>
    <button onclick="cal('+')">+</button><br>

    <button onclick="cal('1')">1</button>
    <button onclick="cal('2')">2</button>
    <button onclick="cal('3')">3</button>
    <button onclick="cal('=')">=</button><br>

    <button onclick="cal('0')">0</button>
    <button onclick="cal('-')">-</button>
</body>
</html>
