<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
            font-size: 0.95em;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: #667eea;
            color: white;
        }

        .btn-submit:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
            padding: 8px 12px;
            font-size: 0.85em;
            flex: none;
        }

        .btn-delete:hover {
            background: #ff5252;
        }

        .btn-edit {
            background: #4ecdc4;
            color: white;
            padding: 8px 12px;
            font-size: 0.85em;
            flex: none;
            margin-right: 5px;
        }

        .btn-edit:hover {
            background: #3db8b0;
        }

        .employees-section {
            grid-column: 1 / -1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border: none;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .employees-section {
                grid-column: 1;
            }

            thead {
                display: none;
            }

            tr {
                display: block;
                margin-bottom: 15px;
                border: 1px solid #ddd;
                border-radius: 5px;
            }

            td {
                display: block;
                padding: 8px 15px;
                border-bottom: none;
            }

            td:before {
                content: attr(data-label);
                font-weight: 600;
                color: #667eea;
                width: 100%;
                display: block;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 Employee Management System</h1>
            <p>Manage your employees efficiently and easily</p>
        </div>

        <div class="main-content">
            <!-- Add Employee Form -->
            <div class="card">
                <h2>➕ Add Employee</h2>
                <div class="alert" id="formAlert"></div>

                <form id="employeeForm">
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" placeholder="Enter full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" placeholder="Enter email address" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone *</label>
                        <input type="tel" id="phone" placeholder="Enter phone number" required>
                    </div>

                    <div class="form-group">
                        <label for="department">Department *</label>
                        <select id="department" required>
                            <option value="">-- Select Department --</option>
                            <option value="IT">IT</option>
                            <option value="HR">HR</option>
                            <option value="Finance">Finance</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                            <option value="Operations">Operations</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="salary">Annual Salary *</label>
                        <input type="number" id="salary" placeholder="Enter salary" min="0" required>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-submit">➕ Add Employee</button>
                        <button type="reset" class="btn-reset">↺ Clear</button>
                    </div>
                </form>
            </div>

            <!-- Statistics Card -->
            <div class="card">
                <h2>📊 Statistics</h2>
                <div style="padding: 20px 0;">
                    <div style="margin-bottom: 25px;">
                        <p style="color: #999; font-size: 0.9em; margin-bottom: 5px;">Total Employees</p>
                        <p style="font-size: 2.5em; color: #667eea; font-weight: bold;" id="totalCount">0</p>
                    </div>
                    <div style="margin-bottom: 25px;">
                        <p style="color: #999; font-size: 0.9em; margin-bottom: 5px;">Total Salary Cost</p>
                        <p style="font-size: 2.5em; color: #764ba2; font-weight: bold;" id="totalSalary">$0</p>
                    </div>
                    <div>
                        <p style="color: #999; font-size: 0.9em; margin-bottom: 5px;">Average Salary</p>
                        <p style="font-size: 2.5em; color: #4ecdc4; font-weight: bold;" id="avgSalary">$0</p>
                    </div>
                </div>
            </div>

            <!-- Employees Table -->
            <div class="card employees-section">
                <h2>📋 All Employees</h2>
                <div class="alert" id="tableAlert"></div>
                <table id="employeeTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Department</th>
                            <th>Salary</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="6" class="no-data">No employees added yet. Add one to get started!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/employees';

        // Get DOM elements
        const form = document.getElementById('employeeForm');
        const formAlert = document.getElementById('formAlert');
        const tableAlert = document.getElementById('tableAlert');
        const tableBody = document.getElementById('tableBody');
        const totalCount = document.getElementById('totalCount');
        const totalSalary = document.getElementById('totalSalary');
        const avgSalary = document.getElementById('avgSalary');

        // Show Alert Message
        function showAlert(message, type, target = 'form') {
            const alertDiv = target === 'form' ? formAlert : tableAlert;
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';

            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 4000);
        }

        // Load Employees from API
        async function loadEmployees() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();

                if (result.success) {
                    displayEmployees(result.data);
                    updateStatistics(result.data);
                } else {
                    showAlert('Failed to load employees', 'error', 'table');
                }
            } catch (error) {
                console.error('Error loading employees:', error);
                showAlert('Error connecting to server', 'error', 'table');
            }
        }

        // Display Employees in Table
        function displayEmployees(employees) {
            if (employees.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="no-data">No employees added yet. Add one to get started!</td></tr>';
                return;
            }

            tableBody.innerHTML = employees.map(emp => `
                <tr>
                    <td data-label="Name">${emp.name}</td>
                    <td data-label="Email">${emp.email}</td>
                    <td data-label="Phone">${emp.phone}</td>
                    <td data-label="Department"><span style="background: #667eea; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85em;">${emp.department}</span></td>
                    <td data-label="Salary">$${emp.salary.toLocaleString()}</td>
                    <td data-label="Actions">
                        <div class="action-buttons">
                            <button class="btn-edit" onclick="editEmployee('${emp._id}')">Edit</button>
                            <button class="btn-delete" onclick="deleteEmployee('${emp._id}', '${emp.name}')">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Update Statistics
        function updateStatistics(employees) {
            totalCount.textContent = employees.length;

            const total = employees.reduce((sum, emp) => sum + emp.salary, 0);
            totalSalary.textContent = '$' + total.toLocaleString();

            const avg = employees.length > 0 ? total / employees.length : 0;
            avgSalary.textContent = '$' + Math.round(avg).toLocaleString();
        }

        // Add Employee
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const department = document.getElementById('department').value;
            const salary = document.getElementById('salary').value;

            if (!name || !email || !phone || !department || !salary) {
                showAlert('Please fill all fields', 'error');
                return;
            }

            try {
                form.classList.add('loading');

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, phone, department, salary })
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('✓ Employee added successfully!', 'success');
                    form.reset();
                    loadEmployees();
                } else {
                    showAlert(result.message || 'Error adding employee', 'error');
                }
            } catch (error) {
                console.error('Error adding employee:', error);
                showAlert('Error connecting to server', 'error');
            } finally {
                form.classList.remove('loading');
            }
        });

        // Delete Employee
        async function deleteEmployee(id, name) {
            if (!confirm(`Are you sure you want to delete ${name}?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    showAlert(`✓ ${name} deleted successfully!`, 'success', 'table');
                    loadEmployees();
                } else {
                    showAlert(result.message || 'Error deleting employee', 'error', 'table');
                }
            } catch (error) {
                console.error('Error deleting employee:', error);
                showAlert('Error connecting to server', 'error', 'table');
            }
        }

        // Edit Employee (Bonus Feature)
        function editEmployee(id) {
            showAlert('Edit feature coming soon!', 'info', 'table');
            // This can be implemented to populate the form with employee data for editing
        }

        // Initial Load
        window.addEventListener('DOMContentLoaded', () => {
            loadEmployees();
            // Refresh data every 5 seconds
            setInterval(loadEmployees, 5000);
        });
    </script>
</body>
</html>
